<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AES-GCM 安全加密箱 | 穿梭框 + 暗色模式</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
            transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s;
        }
        /* 暗色模式变量 */
        :root {
            --bg-gradient-start: #f5f7fc;
            --bg-gradient-end: #eef2f8;
            --card-bg: rgba(255,255,255,0.88);
            --card-border: rgba(255,255,255,0.6);
            --text-primary: #1e2f41;
            --text-secondary: #4a627a;
            --file-area-bg: #f8fafd;
            --border-light: #cbdde9;
            --accent: #1f6392;
            --accent-hover: #0f4b6e;
            --secondary: #3b6e54;
            --thumb-bg: #f1f5f9;
            --keybox-bg: #f0f4e9;
        }
        body.dark {
            --bg-gradient-start: #121826;
            --bg-gradient-end: #1a1f2e;
            --card-bg: rgba(30,35,48,0.92);
            --card-border: rgba(70,80,100,0.4);
            --text-primary: #eef2ff;
            --text-secondary: #b9c7d9;
            --file-area-bg: #1e2538;
            --border-light: #2f3b54;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --secondary: #4c9f70;
            --thumb-bg: #262e44;
            --keybox-bg: #1f2a3e;
        }
        body {
            background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end));
            margin: 0;
            min-height: 100vh;
            padding: 1.5rem 1rem;
            color: var(--text-primary);
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #2c7da0, #61a5c2);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0;
        }
        .darkmode-toggle {
            background: var(--accent);
            border: none;
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1.8rem;
            justify-content: center;
        }
        .card {
            flex: 1;
            min-width: 360px;
            background: var(--card-bg);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
            padding: 1.5rem;
            border: 1px solid var(--card-border);
        }
        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.2rem;
            color: var(--text-primary);
            border-left: 5px solid var(--accent);
            padding-left: 1rem;
        }
        .mode-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 0.6rem;
        }
        .mode-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .mode-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        /* 穿梭框样式 */
        .transfer-container {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .transfer-panel {
            flex: 1;
            background: var(--file-area-bg);
            border-radius: 1.2rem;
            padding: 0.8rem;
            border: 1px solid var(--border-light);
        }
        .transfer-panel h4 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .transfer-list {
            min-height: 260px;
            max-height: 300px;
            overflow-y: auto;
            background: var(--thumb-bg);
            border-radius: 1rem;
            padding: 6px;
        }
        .transfer-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            margin-bottom: 6px;
            background: var(--card-bg);
            border-radius: 0.8rem;
            cursor: pointer;
            border: 1px solid var(--border-light);
        }
        .transfer-item img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 8px;
        }
        .transfer-item span {
            flex: 1;
            font-size: 0.75rem;
            word-break: break-all;
        }
        .transfer-item button {
            background: transparent;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }
        .transfer-buttons {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }
        .transfer-buttons button {
            background: var(--accent);
            border: none;
            border-radius: 2rem;
            padding: 8px 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-sm {
            padding: 0.3rem 0.8rem;
            font-size: 0.7rem;
            width: auto;
            margin-top: 0;
        }
        .btn {
            background: var(--accent);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.7rem 1rem;
            border-radius: 2.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            width: 100%;
            margin-top: 0.6rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        .key-box {
            background: var(--keybox-bg);
            padding: 0.6rem;
            border-radius: 1rem;
            font-family: monospace;
            font-size: 0.7rem;
            word-break: break-all;
            margin: 0.8rem 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
            max-height: 180px;
            overflow-y: auto;
            padding: 6px;
            background: var(--thumb-bg);
            border-radius: 1rem;
        }
        .preview-thumb {
            position: relative;
            width: 70px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            cursor: pointer;
        }
        .preview-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 20px;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 1rem;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
        }
        .small-note {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: 0.6rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
        }
        .status-badge {
            display: inline-block;
            background: var(--thumb-bg);
            padding: 4px 12px;
            border-radius: 2rem;
            font-size: 0.75rem;
        }
        .success {
            color: #2ecc71;
            background: rgba(46,204,113,0.2);
        }
        .error {
            color: #e74c3c;
            background: rgba(231,76,60,0.2);
        }
        .camera-panel {
            margin-top: 8px;
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 0.8rem;
        }
        .camera-video {
            width: 100%;
            border-radius: 0.8rem;
        }
        .flex-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            border: 1px solid var(--border-light);
            background: var(--file-area-bg);
            color: var(--text-primary);
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>🛡️ AES-GCM 安全加密箱 · 穿梭框 + 暗色模式</h1>
        <button id="darkModeToggle" class="darkmode-toggle">🌙 暗色模式</button>
    </div>
    <div class="cards-grid">
        <!-- 统一加密卡片（支持标准模式/穿梭框模式） -->
        <div class="card">
            <div class="card-title">🔒 加密保护</div>
            <div class="mode-switch">
                <button id="standardModeBtn" class="mode-btn active">📁 标准模式</button>
                <button id="transferModeBtn" class="mode-btn">🔄 穿梭框模式</button>
            </div>
            <!-- 标准模式界面 -->
            <div id="standardModePanel">
                <div class="file-area">
                    <label class="file-label" for="unifiedFileInput">📂 选择文件/多图</label>
                    <input type="file" id="unifiedFileInput" accept="image/*,video/*" multiple>
                    <button id="unifiedCameraBtn" class="btn-outline btn" style="width:auto; display:inline-flex; margin:0 0 0 8px; padding:0.4rem 1rem;">📸 拍照</button>
                    <div id="previewContainerUnified" class="preview-grid"></div>
                    <div id="cameraUnifiedPanel" style="display:none; margin-top:8px;"></div>
                    <div id="cameraStatusUnified" class="small-note"></div>
                </div>
                <button id="unifiedEncryptBtn" class="btn btn-primary">✨ 加密并生成文件 + 密钥</button>
            </div>
            <!-- 穿梭框模式界面 (默认隐藏) -->
            <div id="transferModePanel" style="display:none;">
                <div class="file-area">
                    <div class="flex-row" style="justify-content: space-between;">
                        <label class="file-label" for="transferAddFiles">➕ 添加图片到左侧库</label>
                        <input type="file" id="transferAddFiles" accept="image/*" multiple style="display:none;">
                        <button id="transferCameraBtn" class="btn-outline btn-sm">📸 拍照添加</button>
                    </div>
                    <div class="transfer-container">
                        <div class="transfer-panel">
                            <h4>📋 图片库 <span id="leftCount">0</span></h4>
                            <div id="leftList" class="transfer-list"></div>
                        </div>
                        <div class="transfer-buttons">
                            <button id="toRightBtn" title="移至待加密 →">→</button>
                            <button id="toLeftBtn" title="← 移回">←</button>
                            <button id="toAllRightBtn" title="全部移至待加密">⇉</button>
                        </div>
                        <div class="transfer-panel">
                            <h4>✅ 待加密列表 <span id="rightCount">0</span></h4>
                            <div id="rightList" class="transfer-list"></div>
                        </div>
                    </div>
                    <div id="transferCameraContainer" style="display:none; margin-top:8px;"></div>
                    <div class="small-note">💡 穿梭框模式：将图片添加到左侧库，再移到右侧，加密右侧所有图片（多图自动打包）</div>
                </div>
                <button id="transferEncryptBtn" class="btn btn-primary">🔒 加密右侧列表 (批量/单文件)</button>
            </div>
            <div id="encryptResultUnified" style="display:none; margin-top:1rem; background:var(--card-bg); border-radius:1rem; padding:0.8rem;">
                <div><strong>✅ 加密完成</strong></div>
                <div class="key-box"><span>🔑 密钥:</span><span id="unifiedGeneratedKey"></span><button id="copyUnifiedKeyBtn" class="copy-btn">复制</button></div>
                <button id="downloadUnifiedFileBtn" class="btn-outline btn">⬇️ 下载加密文件</button>
            </div>
        </div>

        <!-- 解密卡片 (不变) -->
        <div class="card">
            <div class="card-title">🔓 解密验证</div>
            <div class="file-area">
                <label class="file-label" for="decryptFileInput">📁 上传加密文件</label>
                <input type="file" id="decryptFileInput">
                <div id="decryptFileName" class="small-note" style="margin-top:5px;">未选择文件</div>
            </div>
            <input type="text" id="decryptKeyInput" placeholder="粘贴 Base64 密钥">
            <button id="decryptBtn" class="btn btn-secondary">🔎 解密并校验完整性</button>
            <div id="decryptStatus" style="margin-top:1rem;">
                <div class="status-badge">等待解密</div>
                <div id="verifyMessage" style="margin-top:6px;"></div>
                <div id="decryptPreviewArea" class="preview-box" style="display:none; max-height:350px; overflow-y:auto; margin-top:10px;"></div>
            </div>
        </div>
    </div>
    <footer>🔐 AES-GCM 256 | Deflate压缩 | SHA-256 | 穿梭框支持批量管理 | 暗色模式跟随系统偏好记忆 | code by deepseek</footer>
</div>
<div id="imageModal" class="modal"><span class="close-modal">&times;</span><img class="modal-content" id="modalImg"></div>

<script>
    (function(){
        // -------------------- 暗色模式 --------------------
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDark = localStorage.getItem('theme') === 'dark';
        if(isDark) document.body.classList.add('dark');
        darkModeToggle.addEventListener('click',()=>{
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            darkModeToggle.innerText = document.body.classList.contains('dark') ? '☀️ 亮色模式' : '🌙 暗色模式';
        });
        if(isDark) darkModeToggle.innerText = '☀️ 亮色模式';
        else darkModeToggle.innerText = '🌙 暗色模式';

        // -------------------- 通用加密核心 --------------------
        function arrayBufferToBase64(buffer){const bytes=new Uint8Array(buffer);let binary='';for(let i=0;i<bytes.byteLength;i++)binary+=String.fromCharCode(bytes[i]);return btoa(binary);}
        function base64ToArrayBuffer(base64){const binary=atob(base64);const bytes=new Uint8Array(binary.length);for(let i=0;i<binary.length;i++)bytes[i]=binary.charCodeAt(i);return bytes.buffer;}
        function concatBuffers(buffers){const total=buffers.reduce((s,b)=>s+b.byteLength,0);const res=new Uint8Array(total);let off=0;for(const buf of buffers){res.set(new Uint8Array(buf),off);off+=buf.byteLength;}return res.buffer;}
        async function compressData(buf){if(!window.CompressionStream)throw new Error("不支持CompressionStream");const blob=new Blob([buf]);const stream=blob.stream().pipeThrough(new CompressionStream('deflate'));const resp=new Response(stream);return await resp.arrayBuffer();}
        async function decompressData(buf){if(!window.DecompressionStream)throw new Error("不支持解压");const blob=new Blob([buf]);const stream=blob.stream().pipeThrough(new DecompressionStream('deflate'));const resp=new Response(stream);return await resp.arrayBuffer();}
        async function sha256Hash(buffer){return new Uint8Array(await crypto.subtle.digest('SHA-256',buffer));}
        async function generateAesKey(){return await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]);}
        async function exportKeyToBase64(key){const raw=await crypto.subtle.exportKey("raw",key);return arrayBufferToBase64(raw);}
        async function importKeyFromBase64(b64){return await crypto.subtle.importKey("raw",base64ToArrayBuffer(b64),{name:"AES-GCM",length:256},false,["decrypt"]);}
        async function aesGcmEncrypt(key,plaintext){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv:iv},key,plaintext);return concatBuffers([iv.buffer,ct]);}
        async function aesGcmDecrypt(key,encrypted){if(encrypted.byteLength<12)throw new Error("密文损坏");const iv=new Uint8Array(encrypted.slice(0,12));const ct=encrypted.slice(12);return await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);}
        async function buildSinglePayload(mime,origHash,compressed){const enc=new TextEncoder();const mimeBytes=enc.encode(mime);const lenBuf=new ArrayBuffer(2);new DataView(lenBuf).setUint16(0,mimeBytes.length,false);return concatBuffers([lenBuf,mimeBytes,new Uint8Array(origHash).buffer,compressed]);}
        async function parseSinglePayload(buf){const dv=new DataView(buf);const mimeLen=dv.getUint16(0,false);let off=2;const mime=new TextDecoder().decode(new Uint8Array(buf,off,mimeLen));off+=mimeLen;const expectedHash=new Uint8Array(buf,off,32);off+=32;const compressed=buf.slice(off);return {mimeType:mime,expectedHash,compressedData:compressed};}
        async function buildBatchPayload(files){const enc=new TextEncoder();const parts=[enc.encode("MULT").buffer,new Uint8Array([1]).buffer];const countBuf=new ArrayBuffer(4);new DataView(countBuf).setUint32(0,files.length,true);parts.push(countBuf);for(const f of files){const nameBytes=enc.encode(f.name);const nameLenBuf=new ArrayBuffer(2);new DataView(nameLenBuf).setUint16(0,nameBytes.length,false);parts.push(nameLenBuf,nameBytes.buffer);const mimeBytes=enc.encode(f.mime);const mimeLenBuf=new ArrayBuffer(2);new DataView(mimeLenBuf).setUint16(0,mimeBytes.length,false);parts.push(mimeLenBuf,mimeBytes.buffer);const dataLenBuf=new ArrayBuffer(4);new DataView(dataLenBuf).setUint32(0,f.dataBuffer.byteLength,true);parts.push(dataLenBuf,f.dataBuffer);}return concatBuffers(parts);}
        async function parseBatchPayload(buffer){const dv=new DataView(buffer);let off=4;const version=dv.getUint8(off);off+=1;if(version!==1)throw new Error("批量版本不支持");const fileCount=dv.getUint32(off,true);off+=4;const files=[];for(let i=0;i<fileCount;i++){const nameLen=dv.getUint16(off,false);off+=2;const name=new TextDecoder().decode(new Uint8Array(buffer,off,nameLen));off+=nameLen;const mimeLen=dv.getUint16(off,false);off+=2;const mime=new TextDecoder().decode(new Uint8Array(buffer,off,mimeLen));off+=mimeLen;const dataLen=dv.getUint32(off,true);off+=4;const dataBuffer=buffer.slice(off,off+dataLen);off+=dataLen;files.push({name,mime,dataBuffer});}return files;}

        // -------------------- 标准模式逻辑 (保留原有) --------------------
        let standardSelectedFiles = [], standardCameraBlob=null, standardCameraName=null, activeStream=null;
        const unifiedFileInput = document.getElementById('unifiedFileInput');
        const previewContainer = document.getElementById('previewContainerUnified');
        const unifiedCameraBtn = document.getElementById('unifiedCameraBtn');
        const cameraPanel = document.getElementById('cameraUnifiedPanel');
        const cameraStatusSpan = document.getElementById('cameraStatusUnified');
        const unifiedEncryptBtn = document.getElementById('unifiedEncryptBtn');
        const encryptResultDiv = document.getElementById('encryptResultUnified');
        const unifiedGeneratedKeySpan = document.getElementById('unifiedGeneratedKey');
        const copyUnifiedKeyBtn = document.getElementById('copyUnifiedKeyBtn');
        const downloadUnifiedFileBtn = document.getElementById('downloadUnifiedFileBtn');
        let standardDownloadUrl = null;

        function updateStandardThumbnails(){
            previewContainer.innerHTML = '';
            if(standardCameraBlob){
                const url = URL.createObjectURL(standardCameraBlob);
                const div = document.createElement('div');div.className='preview-thumb';
                div.innerHTML = `<img src="${url}" data-url="${url}"><div class="remove-btn" data-remove="camera">✕</div>`;
                div.querySelector('img').onclick = (e)=>{e.stopPropagation(); openModal(url);};
                div.querySelector('.remove-btn').onclick = (e)=>{e.stopPropagation(); standardCameraBlob=null; standardCameraName=null; updateStandardThumbnails();};
                previewContainer.appendChild(div);
            }
            for(let i=0;i<standardSelectedFiles.length;i++){
                const f=standardSelectedFiles[i];
                const url=URL.createObjectURL(f);
                const div=document.createElement('div');div.className='preview-thumb';
                div.innerHTML = `<img src="${url}" data-url="${url}"><div class="remove-btn" data-index="${i}">✕</div>`;
                div.querySelector('img').onclick = (e)=>{e.stopPropagation(); openModal(url);};
                div.querySelector('.remove-btn').onclick = (e)=>{e.stopPropagation(); standardSelectedFiles.splice(i,1); updateStandardThumbnails(); unifiedFileInput.value='';};
                previewContainer.appendChild(div);
            }
            if(standardSelectedFiles.length===0 && !standardCameraBlob) previewContainer.innerHTML='<div class="small-note">暂无文件，请选择或拍照</div>';
        }
        unifiedFileInput.addEventListener('change',(e)=>{standardCameraBlob=null; standardSelectedFiles=Array.from(e.target.files); updateStandardThumbnails(); encryptResultDiv.style.display='none';});
        function stopCamera(){if(activeStream){activeStream.getTracks().forEach(t=>t.stop());activeStream=null;}}
        function hideCameraUI(){cameraPanel.style.display='none';cameraPanel.innerHTML='';stopCamera();cameraStatusSpan.innerText='';}
        unifiedCameraBtn.addEventListener('click',()=>{stopCamera();cameraPanel.style.display='block';cameraPanel.innerHTML=`<div><video id="unifiedVideo" autoplay playsinline class="camera-video"></video><div style="display:flex; gap:8px; margin-top:8px;"><button id="unifiedCaptureBtn" class="btn-sm" style="background:var(--accent);">📷 拍照</button><button id="unifiedCloseCamBtn" class="btn-sm" style="background:#777;">取消</button></div></div>`;const videoElem=document.getElementById('unifiedVideo');navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{activeStream=stream;videoElem.srcObject=stream;videoElem.play();cameraStatusSpan.innerText='✅ 摄像头已就绪';}).catch(err=>{cameraStatusSpan.innerText='❌ 摄像头失败';hideCameraUI();});document.getElementById('unifiedCaptureBtn')?.addEventListener('click',()=>{const video=document.getElementById('unifiedVideo');if(!video||!video.videoWidth)return;const canvas=document.createElement('canvas');canvas.width=video.videoWidth;canvas.height=video.videoHeight;canvas.getContext('2d').drawImage(video,0,0);canvas.toBlob(blob=>{if(blob){standardCameraBlob=blob;standardCameraName=`camera_${Date.now()}.jpg`;standardSelectedFiles=[];unifiedFileInput.value='';updateStandardThumbnails();cameraStatusSpan.innerText='已拍照，可加密';hideCameraUI();}},'image/jpeg',0.9);});document.getElementById('unifiedCloseCamBtn')?.addEventListener('click',()=>{hideCameraUI();});});
        async function standardEncrypt(){
            let filesArr=[];
            if(standardCameraBlob) filesArr=[{name:standardCameraName, mime:standardCameraBlob.type||'image/jpeg', data:await standardCameraBlob.arrayBuffer()}];
            else if(standardSelectedFiles.length>0) for(const f of standardSelectedFiles) filesArr.push({name:f.name, mime:f.type||'application/octet-stream', data:await f.arrayBuffer()});
            else throw new Error("无文件");
            const isBatch = filesArr.length>1;
            if(isBatch){
                const rawBatch=await buildBatchPayload(filesArr); const origHash=await sha256Hash(rawBatch); const compressed=await compressData(rawBatch); const finalPlain=concatBuffers([new Uint8Array(origHash).buffer, compressed]); const key=await generateAesKey(); const keyB64=await exportKeyToBase64(key); const encrypted=await aesGcmEncrypt(key,finalPlain); unifiedGeneratedKeySpan.innerText=keyB64; encryptResultDiv.style.display='block'; if(standardDownloadUrl) URL.revokeObjectURL(standardDownloadUrl); standardDownloadUrl=URL.createObjectURL(new Blob([encrypted],{type:'application/octet-stream'})); downloadUnifiedFileBtn.onclick=()=>{const a=document.createElement('a');a.href=standardDownloadUrl;a.download=`batch_${Date.now()}.aes`;a.click();}; copyUnifiedKeyBtn.onclick=()=>{navigator.clipboard.writeText(keyB64);alert("密钥已复制");};}
            else{
                const f=filesArr[0]; const origHash=await sha256Hash(f.data); const compressed=await compressData(f.data); const payload=await buildSinglePayload(f.mime,origHash,compressed); const key=await generateAesKey(); const keyB64=await exportKeyToBase64(key); const encrypted=await aesGcmEncrypt(key,payload); unifiedGeneratedKeySpan.innerText=keyB64; encryptResultDiv.style.display='block'; if(standardDownloadUrl) URL.revokeObjectURL(standardDownloadUrl); standardDownloadUrl=URL.createObjectURL(new Blob([encrypted],{type:'application/octet-stream'})); downloadUnifiedFileBtn.onclick=()=>{const a=document.createElement('a');a.href=standardDownloadUrl;a.download=`encrypted_${f.name.replace(/\.[^/.]+$/,'')||'file'}.aes`;a.click();}; copyUnifiedKeyBtn.onclick=()=>{navigator.clipboard.writeText(keyB64);alert("密钥已复制");};
            }
        }
        unifiedEncryptBtn.addEventListener('click',async()=>{unifiedEncryptBtn.disabled=true;unifiedEncryptBtn.innerText='⏳ 加密中...';try{await standardEncrypt();unifiedEncryptBtn.innerText='✨ 加密完成';}catch(e){alert("加密失败:"+e.message);unifiedEncryptBtn.innerText='❌ 重试';}finally{unifiedEncryptBtn.disabled=false;}});

        // -------------------- 穿梭框逻辑 --------------------
        let leftItems = [];      // { id, name, mime, dataUrl, arrayBuffer }
        let rightItems = [];
        let nextId = 1;
        const transferAddFiles = document.getElementById('transferAddFiles');
        const transferCameraBtn = document.getElementById('transferCameraBtn');
        const leftListDiv = document.getElementById('leftList');
        const rightListDiv = document.getElementById('rightList');
        const leftCountSpan = document.getElementById('leftCount');
        const rightCountSpan = document.getElementById('rightCount');
        const toRightBtn = document.getElementById('toRightBtn');
        const toLeftBtn = document.getElementById('toLeftBtn');
        const toAllRightBtn = document.getElementById('toAllRightBtn');
        const transferEncryptBtn = document.getElementById('transferEncryptBtn');
        let transferCameraStream = null;
        function renderTransfer(){
            leftListDiv.innerHTML = ''; rightListDiv.innerHTML = '';
            leftItems.forEach(item=>{ leftListDiv.appendChild(createTransferItem(item, false)); });
            rightItems.forEach(item=>{ rightListDiv.appendChild(createTransferItem(item, true)); });
            leftCountSpan.innerText = leftItems.length;
            rightCountSpan.innerText = rightItems.length;
        }
        function createTransferItem(item, isRight){
            const div = document.createElement('div'); div.className='transfer-item';
            const img = document.createElement('img'); img.src = item.dataUrl; img.style.width='40px';img.style.height='40px';
            const span = document.createElement('span'); span.innerText = item.name;
            const delBtn = document.createElement('button'); delBtn.innerText = '🗑️'; delBtn.style.background='transparent'; delBtn.onclick=(e)=>{e.stopPropagation(); if(isRight) rightItems=rightItems.filter(i=>i.id!==item.id); else leftItems=leftItems.filter(i=>i.id!==item.id); renderTransfer(); };
            div.appendChild(img); div.appendChild(span); div.appendChild(delBtn);
            div.onclick = (e)=>{ if(e.target===delBtn) return; if(isRight) moveToLeft(item.id); else moveToRight(item.id); };
            return div;
        }
        function moveToRight(id){ const idx=leftItems.findIndex(i=>i.id===id); if(idx!==-1){ rightItems.push(leftItems[idx]); leftItems.splice(idx,1); renderTransfer(); } }
        function moveToLeft(id){ const idx=rightItems.findIndex(i=>i.id===id); if(idx!==-1){ leftItems.push(rightItems[idx]); rightItems.splice(idx,1); renderTransfer(); } }
        function moveAllToRight(){ rightItems.push(...leftItems); leftItems=[]; renderTransfer(); }
        async function addFileToLeft(file){
            const ab = await file.arrayBuffer();
            const url = URL.createObjectURL(file);
            leftItems.push({ id: nextId++, name: file.name, mime: file.type || 'image/jpeg', dataUrl: url, arrayBuffer: ab });
            renderTransfer();
        }
        transferAddFiles.addEventListener('change',(e)=>{ Array.from(e.target.files).forEach(f=>addFileToLeft(f)); e.target.value=''; });
        transferCameraBtn.addEventListener('click',()=>{ const container = document.getElementById('transferCameraContainer'); container.style.display='block'; container.innerHTML=`<div><video id="transferCamVideo" autoplay playsinline class="camera-video"></video><div><button id="transferCamCapture" class="btn-sm">拍照添加</button><button id="transferCamClose" class="btn-sm">关闭</button></div></div>`; const vid=document.getElementById('transferCamVideo'); navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{transferCameraStream=stream;vid.srcObject=stream;vid.play();}).catch(e=>alert("摄像头失败")); document.getElementById('transferCamCapture')?.addEventListener('click',()=>{const canvas=document.createElement('canvas');canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;canvas.getContext('2d').drawImage(vid,0,0);canvas.toBlob(blob=>{if(blob){const file=new File([blob],`cam_${Date.now()}.jpg`,{type:'image/jpeg'});addFileToLeft(file);}},'image/jpeg',0.9);}); document.getElementById('transferCamClose')?.addEventListener('click',()=>{if(transferCameraStream) transferCameraStream.getTracks().forEach(t=>t.stop()); container.style.display='none';}); });
        toRightBtn.addEventListener('click',()=>{ if(leftItems.length) moveToRight(leftItems[0].id); });
        toLeftBtn.addEventListener('click',()=>{ if(rightItems.length) moveToLeft(rightItems[0].id); });
        toAllRightBtn.addEventListener('click',()=>{ moveAllToRight(); });
        transferEncryptBtn.addEventListener('click',async()=>{
            if(rightItems.length===0){ alert("请先添加图片到右侧待加密列表"); return; }
            transferEncryptBtn.disabled=true; transferEncryptBtn.innerText='⏳ 加密中...';
            try{
                const filesData = rightItems.map(item=>({ name:item.name, mime:item.mime, dataBuffer:item.arrayBuffer }));
                const rawBatch = await buildBatchPayload(filesData);
                const origHash = await sha256Hash(rawBatch);
                const compressed = await compressData(rawBatch);
                const finalPlain = concatBuffers([new Uint8Array(origHash).buffer, compressed]);
                const aesKey = await generateAesKey();
                const keyB64 = await exportKeyToBase64(aesKey);
                const encrypted = await aesGcmEncrypt(aesKey, finalPlain);
                unifiedGeneratedKeySpan.innerText = keyB64;
                encryptResultDiv.style.display = 'block';
                if(standardDownloadUrl) URL.revokeObjectURL(standardDownloadUrl);
                standardDownloadUrl = URL.createObjectURL(new Blob([encrypted],{type:'application/octet-stream'}));
                downloadUnifiedFileBtn.onclick = ()=>{const a=document.createElement('a');a.href=standardDownloadUrl;a.download=`transfer_batch_${Date.now()}.aes`;a.click();};
                copyUnifiedKeyBtn.onclick = ()=>{navigator.clipboard.writeText(keyB64);alert("密钥已复制");};
                transferEncryptBtn.innerText = '🔒 加密完成';
            }catch(e){ alert("穿梭框加密失败:"+e.message); transferEncryptBtn.innerText='❌ 重试'; }
            finally{ transferEncryptBtn.disabled=false; }
        });

        // 模式切换
        const standardModeBtn = document.getElementById('standardModeBtn');
        const transferModeBtn = document.getElementById('transferModeBtn');
        const standardPanel = document.getElementById('standardModePanel');
        const transferPanel = document.getElementById('transferModePanel');
        standardModeBtn.addEventListener('click',()=>{ standardModeBtn.classList.add('active'); transferModeBtn.classList.remove('active'); standardPanel.style.display='block'; transferPanel.style.display='none'; });
        transferModeBtn.addEventListener('click',()=>{ transferModeBtn.classList.add('active'); standardModeBtn.classList.remove('active'); standardPanel.style.display='none'; transferPanel.style.display='block'; });
        
        // -------------------- 解密区域 (兼容单文件+批量) --------------------
        const decryptFileInput = document.getElementById('decryptFileInput');
        const decryptFileNameSpan = document.getElementById('decryptFileName');
        const decryptKeyInput = document.getElementById('decryptKeyInput');
        const decryptBtn = document.getElementById('decryptBtn');
        const decryptStatusDiv = document.getElementById('decryptStatus');
        const verifyMessageSpan = document.getElementById('verifyMessage');
        const decryptPreviewArea = document.getElementById('decryptPreviewArea');
        function openModal(src){ const modal=document.getElementById('imageModal'); const modalImg=document.getElementById('modalImg'); modal.style.display='flex'; modalImg.src=src; }
        document.querySelector('.close-modal').onclick = ()=>document.getElementById('imageModal').style.display='none';
        document.getElementById('imageModal').onclick = (e)=>{ if(e.target===document.getElementById('imageModal')) document.getElementById('imageModal').style.display='none'; };
        function clearDecryptPreview(){ decryptPreviewArea.innerHTML=''; decryptPreviewArea.style.display='none'; if(window._decUrls) window._decUrls.forEach(u=>URL.revokeObjectURL(u)); window._decUrls=null; }
        function showBatchDecrypt(files){ clearDecryptPreview(); decryptPreviewArea.style.display='block'; const gallery=document.createElement('div'); gallery.style.display='flex'; gallery.style.flexWrap='wrap'; gallery.style.gap='12px'; const urls=[]; for(let f of files){ const blob=new Blob([f.dataBuffer],{type:f.mime}); const url=URL.createObjectURL(blob); urls.push(url); const div=document.createElement('div'); div.style.width='100px'; div.innerHTML=`<img src="${url}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;cursor:pointer;"><div style="font-size:0.65rem;">${escapeHtml(f.name)}</div><button class="btn-sm" data-url="${url}" data-name="${f.name}">💾保存</button>`; div.querySelector('img').onclick=()=>openModal(url); div.querySelector('button').onclick=(e)=>{e.stopPropagation(); const a=document.createElement('a');a.href=url;a.download=f.name;a.click();}; gallery.appendChild(div); } decryptPreviewArea.appendChild(gallery); window._decUrls=urls; }
        function showSingleDecrypt(blob,mime){ clearDecryptPreview(); decryptPreviewArea.style.display='block'; const url=URL.createObjectURL(blob); if(mime.startsWith('image/')){ const img=document.createElement('img'); img.src=url; img.style.maxWidth='100%'; img.style.maxHeight='300px'; img.style.cursor='pointer'; img.onclick=()=>openModal(url); decryptPreviewArea.appendChild(img); } else if(mime.startsWith('video/')){ const vid=document.createElement('video'); vid.src=url; vid.controls=true; decryptPreviewArea.appendChild(vid); } else decryptPreviewArea.innerHTML='<p>不支持预览</p>'; window._decUrls=[url]; }
        function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;}); }
        decryptBtn.addEventListener('click',async()=>{ if(!decryptFileInput.files.length){alert("请上传加密文件");return;} const keyRaw=decryptKeyInput.value.trim(); if(!keyRaw){alert("请输入密钥");return;} const encBuffer=await decryptFileInput.files[0].arrayBuffer(); const statusSpan=decryptStatusDiv.querySelector('.status-badge'); statusSpan.innerText='🔍 解密验证...'; statusSpan.className='status-badge'; verifyMessageSpan.innerHTML=''; clearDecryptPreview(); decryptBtn.disabled=true; try{ const aesKey=await importKeyFromBase64(keyRaw); const plain=await aesGcmDecrypt(aesKey,encBuffer); let decompressed; try{ decompressed=await decompressData(plain); }catch(e){ decompressed=plain; } if(decompressed.byteLength>=36){ const possibleHash=new Uint8Array(decompressed,0,32); const rest=decompressed.slice(32); try{ const maybeRaw=await decompressData(rest); if(maybeRaw.byteLength>=4 && new Uint8Array(maybeRaw,0,4)[0]===77){ const files=await parseBatchPayload(maybeRaw); const computed=await sha256Hash(maybeRaw); const valid=computed.length===possibleHash.length && computed.every((v,i)=>v===possibleHash[i]); if(!valid)throw new Error("批量哈希失败"); statusSpan.innerText='✅ 批量解密成功'; statusSpan.classList.add('success'); verifyMessageSpan.innerHTML=`<span style="color:#2ecc71;">✓ 完整性通过，共${files.length}个文件</span>`; showBatchDecrypt(files); decryptBtn.disabled=false; return; } }catch(e){ } } const single=await parseSinglePayload(decompressed); const original=await decompressData(single.compressedData); const computedHash=await sha256Hash(original); const valid=computedHash.length===single.expectedHash.length && computedHash.every((v,i)=>v===single.expectedHash[i]); if(!valid)throw new Error("哈希校验失败"); const blob=new Blob([original],{type:single.mimeType}); showSingleDecrypt(blob,single.mimeType); statusSpan.innerText='✅ 解密成功'; statusSpan.classList.add('success'); verifyMessageSpan.innerHTML=`<span style="color:#2ecc71;">✓ 哈希验证通过</span><div>大小:${(original.byteLength/1024/1024).toFixed(2)}MB</div>`; }catch(err){ statusSpan.innerText='❌ 失败'; statusSpan.classList.add('error'); verifyMessageSpan.innerHTML=`<span style="color:#e74c3c;">${err.message}</span>`; clearDecryptPreview(); }finally{ decryptBtn.disabled=false; } });
        decryptFileInput.addEventListener('change',(e)=>{ if(e.target.files.length) decryptFileNameSpan.innerText=e.target.files[0].name; else decryptFileNameSpan.innerText="未选择文件"; clearDecryptPreview(); verifyMessageSpan.innerHTML=''; const badge=decryptStatusDiv.querySelector('.status-badge'); if(badge){badge.className='status-badge'; badge.innerText='等待解密';} });
        updateStandardThumbnails();
        renderTransfer();
    })();
</script>
</body>
</html>
