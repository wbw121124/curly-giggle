<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AES 安全加密箱 | 穿梭库 + 文本文件 + 解密入库</title>
    <style>
        *{box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif;transition:background 0.2s,color 0.2s;}
        :root{--bg-start:#f5f7fc;--bg-end:#eef2f8;--card-bg:rgba(255,255,255,0.88);--card-border:rgba(255,255,255,0.6);--text:#1e2f41;--text-sec:#4a627a;--file-bg:#f8fafd;--border:#cbdde9;--accent:#1f6392;--accent-hover:#0f4b6e;--thumb-bg:#f1f5f9;--keybox:#f0f4e9;}
        body.dark{--bg-start:#121826;--bg-end:#1a1f2e;--card-bg:rgba(30,35,48,0.92);--card-border:rgba(70,80,100,0.4);--text:#eef2ff;--text-sec:#b9c7d9;--file-bg:#1e2538;--border:#2f3b54;--accent:#3b82f6;--accent-hover:#60a5fa;--thumb-bg:#262e44;--keybox:#1f2a3e;}
        body{background:linear-gradient(145deg,var(--bg-start),var(--bg-end));margin:0;min-height:100vh;padding:1.5rem 1rem;color:var(--text);}
        .app-container{max-width:1600px;margin:0 auto;}
        .header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:2rem;}
        .header h1{font-size:1.8rem;background:linear-gradient(135deg,#2c7da0,#61a5c2);background-clip:text;-webkit-background-clip:text;color:transparent;}
        .darkmode-toggle{background:var(--accent);border:none;border-radius:3rem;padding:0.5rem 1rem;color:white;cursor:pointer;}
        .cards-grid{display:flex;flex-wrap:wrap;gap:1.8rem;justify-content:center;}
        .card{flex:1;min-width:360px;background:var(--card-bg);backdrop-filter:blur(2px);border-radius:2rem;padding:1.5rem;border:1px solid var(--card-border);}
        .card-title{font-size:1.4rem;font-weight:600;display:flex;align-items:center;gap:8px;margin-bottom:1rem;color:var(--text);border-left:5px solid var(--accent);padding-left:1rem;}
        .mode-switch{display:flex;gap:10px;margin-bottom:1rem;border-bottom:1px solid var(--border);padding-bottom:0.6rem;}
        .mode-btn{background:transparent;border:1px solid var(--border);padding:0.4rem 1rem;border-radius:2rem;cursor:pointer;color:var(--text-sec);}
        .mode-btn.active{background:var(--accent);border-color:var(--accent);color:white;}
        .file-area{background:var(--file-bg);border-radius:1.5rem;padding:1rem;margin-bottom:1rem;border:1px dashed var(--border);}
        .file-label{display:inline-flex;align-items:center;gap:0.5rem;background:var(--card-bg);padding:0.5rem 1rem;border-radius:3rem;font-weight:500;cursor:pointer;border:1px solid var(--border);margin:0 5px 8px 0;}
        input[type="file"]{display:none;}
        .preview-grid, .transfer-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;max-height:180px;overflow-y:auto;padding:6px;background:var(--thumb-bg);border-radius:1rem;}
        .preview-thumb, .transfer-item{position:relative;width:70px;background:var(--card-bg);border-radius:8px;overflow:hidden;border:1px solid var(--border);cursor:pointer;padding:4px;text-align:center;}
        .preview-thumb img, .transfer-item img{width:100%;height:70px;object-fit:cover;border-radius:6px;}
        .transfer-item{width:auto;min-width:140px;display:flex;align-items:center;gap:8px;padding:6px;}
        .transfer-item img{width:40px;height:40px;}
        .transfer-item span{flex:1;font-size:0.7rem;word-break:break-all;}
        .remove-btn{position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.6);color:white;border-radius:20px;width:18px;height:18px;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .btn{background:var(--accent);border:none;color:white;font-weight:600;padding:0.7rem 1rem;border-radius:2.5rem;cursor:pointer;width:100%;margin-top:0.6rem;display:flex;align-items:center;justify-content:center;gap:6px;}
        .btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent);}
        .btn-sm{padding:0.3rem 0.8rem;font-size:0.7rem;width:auto;margin-top:0;}
        .key-box{background:var(--keybox);padding:0.6rem;border-radius:1rem;font-family:monospace;font-size:0.7rem;margin:0.8rem 0;display:flex;justify-content:space-between;flex-wrap:wrap;}
        .transfer-container{display:flex;gap:1rem;flex-wrap:wrap;margin-top:0.5rem;}
        .transfer-panel{flex:1;background:var(--file-bg);border-radius:1.2rem;padding:0.8rem;border:1px solid var(--border);}
        .transfer-buttons{display:flex;flex-direction:column;justify-content:center;gap:8px;}
        .modal{display:none;position:fixed;z-index:1000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;}
        .modal-content{max-width:90%;max-height:90%;border-radius:1rem;}
        .close-modal{position:absolute;top:20px;right:35px;color:#fff;font-size:40px;cursor:pointer;}
        .small-note{font-size:0.7rem;color:var(--text-sec);text-align:center;margin-top:0.6rem;}
        .status-badge{display:inline-block;background:var(--thumb-bg);padding:4px 12px;border-radius:2rem;font-size:0.75rem;}
        .success{color:#2ecc71;background:rgba(46,204,113,0.2);}
        .error{color:#e74c3c;background:rgba(231,76,60,0.2);}
        .camera-video{width:100%;border-radius:0.8rem;}
        footer{text-align:center;margin-top:2rem;font-size:0.7rem;color:var(--text-sec);}
        input[type="text"]{flex:1;padding:0.5rem 1rem;border-radius:2rem;border:1px solid var(--border);background:var(--file-bg);color:var(--text);}
        .doc-icon{font-size:28px;line-height:1;margin:8px 0;}
    </style>
</head>
<body>
<div class="app-container">
    <div class="header"><h1>🛡️ AES-GCM 安全加密箱 · 穿梭库 + 文本文件</h1><button id="darkModeToggle" class="darkmode-toggle">🌙 暗色模式</button></div>
    <div class="cards-grid">
        <!-- 统一加密卡片（标准模式 / 穿梭框模式） -->
        <div class="card">
            <div class="card-title">🔒 加密保护</div>
            <div class="mode-switch"><button id="standardModeBtn" class="mode-btn active">📁 标准模式</button><button id="transferModeBtn" class="mode-btn">🔄 穿梭框模式</button></div>
            <!-- 标准模式 -->
            <div id="standardModePanel">
                <div class="file-area">
                    <label class="file-label" for="unifiedFileInput">📂 选择文件(图/视频/html/txt)</label>
                    <input type="file" id="unifiedFileInput" accept="image/*,video/*,.html,.txt,.htm,.text/plain" multiple>
                    <button id="unifiedCameraBtn" class="btn-outline btn-sm" style="display:inline-flex;">📸 拍照</button>
                    <div id="previewContainerUnified" class="preview-grid"></div>
                    <div id="cameraUnifiedPanel" style="display:none;"></div>
                    <div id="cameraStatusUnified" class="small-note"></div>
                </div>
                <button id="unifiedEncryptBtn" class="btn">✨ 加密并生成文件 + 密钥</button>
            </div>
            <!-- 穿梭框模式 -->
            <div id="transferModePanel" style="display:none;">
                <div class="file-area">
                    <div class="flex-row" style="display:flex;gap:8px;flex-wrap:wrap;">
                        <label class="file-label" for="transferAddFiles">➕ 添加文件(图片/html/txt)</label>
                        <input type="file" id="transferAddFiles" accept="image/*,video/*,.html,.txt,.htm" multiple>
                        <button id="transferCameraBtn" class="btn-outline btn-sm">📸 拍照</button>
                    </div>
                    <div class="transfer-container">
                        <div class="transfer-panel"><h4>📚 图片库 <span id="leftCount">0</span></h4><div id="leftList" class="transfer-list"></div></div>
                        <div class="transfer-buttons"><button id="toRightBtn">→</button><button id="toLeftBtn">←</button><button id="toAllRightBtn">⇉</button></div>
                        <div class="transfer-panel"><h4>✅ 待加密列表 <span id="rightCount">0</span></h4><div id="rightList" class="transfer-list"></div></div>
                    </div>
                    <div id="transferCameraContainer" style="display:none;"></div>
                </div>
                <button id="transferEncryptBtn" class="btn">🔒 加密右侧列表 (批量/单文件)</button>
            </div>
            <div id="encryptResultUnified" style="display:none; margin-top:1rem; padding:0.8rem; background:var(--card-bg); border-radius:1rem;">
                <div><strong>✅ 加密完成</strong></div>
                <div class="key-box"><span>🔑 密钥:</span><span id="unifiedGeneratedKey"></span><button id="copyUnifiedKeyBtn" class="copy-btn btn-sm">复制</button></div>
                <button id="downloadUnifiedFileBtn" class="btn-outline btn">⬇️ 下载加密文件</button>
            </div>
        </div>

        <!-- 解密卡片 (支持解密后加入图片库) -->
        <div class="card">
            <div class="card-title">🔓 解密验证 + 加入库</div>
            <div class="file-area">
                <label class="file-label" for="decryptFileInput">📁 上传加密文件</label>
                <input type="file" id="decryptFileInput">
                <div id="decryptFileName" class="small-note">未选择文件</div>
            </div>
            <input type="text" id="decryptKeyInput" placeholder="粘贴 Base64 密钥">
            <button id="decryptBtn" class="btn btn-secondary">🔎 解密并校验完整性</button>
            <div id="decryptStatus" style="margin-top:1rem;">
                <div class="status-badge">等待解密</div>
                <div id="verifyMessage" style="margin-top:6px;"></div>
                <div id="decryptPreviewArea" style="display:none; margin-top:10px; max-height:350px; overflow-y:auto;"></div>
            </div>
        </div>
    </div>
    <footer>🔐 支持图片/视频/html/txt | 解密文件可一键加入穿梭图片库 | 暗色模式 | 全本地处理</footer>
</div>
<div id="imageModal" class="modal"><span class="close-modal">&times;</span><img class="modal-content" id="modalImg"></div>

<script>
    (function(){
        // 暗色模式
        const darkToggle = document.getElementById('darkModeToggle');
        if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');
        darkToggle.addEventListener('click',()=>{ document.body.classList.toggle('dark'); localStorage.setItem('theme',document.body.classList.contains('dark')?'dark':'light'); darkToggle.innerText = document.body.classList.contains('dark')?'☀️ 亮色模式':'🌙 暗色模式'; });
        if(document.body.classList.contains('dark')) darkToggle.innerText='☀️ 亮色模式';
        else darkToggle.innerText='🌙 暗色模式';

        // ---------- 加密核心工具 ----------
        function arrBufToBase64(b){const u=new Uint8Array(b);let s='';for(let i=0;i<u.length;i++)s+=String.fromCharCode(u[i]);return btoa(s);}
        function base64ToArrBuf(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;}
        function concatBufs(bufs){const total= bufs.reduce((s,b)=>s+b.byteLength,0);const res=new Uint8Array(total);let off=0;for(const b of bufs){res.set(new Uint8Array(b),off);off+=b.byteLength;}return res.buffer;}
        async function compress(b){if(!window.CompressionStream)throw new Error("不支持压缩");const blob=new Blob([b]);const stream=blob.stream().pipeThrough(new CompressionStream('deflate'));return await new Response(stream).arrayBuffer();}
        async function decompress(b){if(!window.DecompressionStream)throw new Error("不支持解压");const blob=new Blob([b]);const stream=blob.stream().pipeThrough(new DecompressionStream('deflate'));return await new Response(stream).arrayBuffer();}
        async function sha256(b){return new Uint8Array(await crypto.subtle.digest('SHA-256',b));}
        async function genKey(){return await crypto.subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]);}
        async function exportKeyB64(key){return arrBufToBase64(await crypto.subtle.exportKey("raw",key));}
        async function importKeyB64(b64){return await crypto.subtle.importKey("raw",base64ToArrBuf(b64),{name:"AES-GCM",length:256},false,["decrypt"]);}
        async function aesEncrypt(key,plain){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,plain);return concatBufs([iv.buffer,ct]);}
        async function aesDecrypt(key,enc){if(enc.byteLength<12)throw new Error("密文损坏");const iv=new Uint8Array(enc.slice(0,12));const ct=enc.slice(12);return await crypto.subtle.decrypt({name:"AES-GCM",iv},key,ct);}
        async function buildSinglePayload(mime,hash,comp){const enc=new TextEncoder();const mimeBytes=enc.encode(mime);const lenBuf=new ArrayBuffer(2);new DataView(lenBuf).setUint16(0,mimeBytes.length,false);return concatBufs([lenBuf,mimeBytes,hash.buffer,comp]);}
        async function parseSinglePayload(buf){const dv=new DataView(buf);const mimeLen=dv.getUint16(0,false);let off=2;const mime=new TextDecoder().decode(new Uint8Array(buf,off,mimeLen));off+=mimeLen;const hash=new Uint8Array(buf,off,32);off+=32;const comp=buf.slice(off);return {mimeType:mime,expectedHash:hash,compressedData:comp};}
        async function buildBatchPayload(files){const enc=new TextEncoder();const parts=[enc.encode("MULT").buffer,new Uint8Array([1]).buffer];const cntBuf=new ArrayBuffer(4);new DataView(cntBuf).setUint32(0,files.length,true);parts.push(cntBuf);for(const f of files){const nameBytes=enc.encode(f.name);const nameLen=new ArrayBuffer(2);new DataView(nameLen).setUint16(0,nameBytes.length,false);parts.push(nameLen,nameBytes.buffer);const mimeBytes=enc.encode(f.mime);const mimeLen=new ArrayBuffer(2);new DataView(mimeLen).setUint16(0,mimeBytes.length,false);parts.push(mimeLen,mimeBytes.buffer);const dataLen=new ArrayBuffer(4);new DataView(dataLen).setUint32(0,f.dataBuffer.byteLength,true);parts.push(dataLen,f.dataBuffer);}return concatBufs(parts);}
        async function parseBatchPayload(buf){const dv=new DataView(buf);let off=4;const ver=dv.getUint8(off);off+=1;if(ver!==1)throw new Error("版本不支持");const cnt=dv.getUint32(off,true);off+=4;const files=[];for(let i=0;i<cnt;i++){const nameLen=dv.getUint16(off,false);off+=2;const name=new TextDecoder().decode(new Uint8Array(buf,off,nameLen));off+=nameLen;const mimeLen=dv.getUint16(off,false);off+=2;const mime=new TextDecoder().decode(new Uint8Array(buf,off,mimeLen));off+=mimeLen;const dataLen=dv.getUint32(off,true);off+=4;const data=buf.slice(off,off+dataLen);off+=dataLen;files.push({name,mime,dataBuffer:data});}return files;}

        // ---------- 标准模式变量 ----------
        let stdFiles=[], stdCameraBlob=null, stdCameraName=null, activeStream=null, stdDownloadUrl=null;
        const stdFileInput=document.getElementById('unifiedFileInput'), stdPreview=document.getElementById('previewContainerUnified');
        const stdCameraBtn=document.getElementById('unifiedCameraBtn'), stdCameraPanel=document.getElementById('cameraUnifiedPanel'), stdCameraStatus=document.getElementById('cameraStatusUnified');
        const stdEncryptBtn=document.getElementById('unifiedEncryptBtn'), encryptResultDiv=document.getElementById('encryptResultUnified');
        const genKeySpan=document.getElementById('unifiedGeneratedKey'), copyKeyBtn=document.getElementById('copyUnifiedKeyBtn'), downloadBtn=document.getElementById('downloadUnifiedFileBtn');
        function updateStdThumbs(){
            stdPreview.innerHTML='';
            if(stdCameraBlob){ const url=URL.createObjectURL(stdCameraBlob); const div=makeThumb(url,()=>openModal(url),()=>{stdCameraBlob=null;stdCameraName=null;updateStdThumbs();}); stdPreview.appendChild(div); }
            for(let i=0;i<stdFiles.length;i++){ const f=stdFiles[i]; const url=URL.createObjectURL(f); const div=makeThumb(url,()=>openModal(url),()=>{stdFiles.splice(i,1);updateStdThumbs();stdFileInput.value='';}); stdPreview.appendChild(div); }
            if(stdFiles.length===0 && !stdCameraBlob) stdPreview.innerHTML='<div class="small-note">支持图片/视频/HTML/TXT</div>';
        }
        function makeThumb(url,onClick,onRemove){ const div=document.createElement('div');div.className='preview-thumb';const img=document.createElement('img');img.src=url;img.onclick=onClick;div.appendChild(img);const rm=document.createElement('div');rm.className='remove-btn';rm.innerText='✕';rm.onclick=(e)=>{e.stopPropagation();onRemove();URL.revokeObjectURL(url);};div.appendChild(rm);return div; }
        stdFileInput.addEventListener('change',(e)=>{stdCameraBlob=null;stdFiles=Array.from(e.target.files);updateStdThumbs();encryptResultDiv.style.display='none';});
        function stopCam(){if(activeStream){activeStream.getTracks().forEach(t=>t.stop());activeStream=null;}}
        function hideCamUI(){stdCameraPanel.style.display='none';stdCameraPanel.innerHTML='';stopCam();stdCameraStatus.innerText='';}
        stdCameraBtn.onclick=()=>{stopCam();stdCameraPanel.style.display='block';stdCameraPanel.innerHTML=`<div><video id="stdCamVideo" autoplay playsinline class="camera-video"></video><div style="display:flex;gap:8px;margin-top:8px;"><button id="stdCapture" class="btn-sm">📷 拍照</button><button id="stdCloseCam" class="btn-sm">取消</button></div></div>`;const vid=document.getElementById('stdCamVideo');navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{activeStream=stream;vid.srcObject=stream;vid.play();stdCameraStatus.innerText='就绪';}).catch(()=>stdCameraStatus.innerText='摄像头失败');document.getElementById('stdCapture')?.addEventListener('click',()=>{const canvas=document.createElement('canvas');canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;canvas.getContext('2d').drawImage(vid,0,0);canvas.toBlob(blob=>{if(blob){stdCameraBlob=blob;stdCameraName=`camera_${Date.now()}.jpg`;stdFiles=[];stdFileInput.value='';updateStdThumbs();stdCameraStatus.innerText='已拍照';hideCamUI();}},'image/jpeg',0.9);});document.getElementById('stdCloseCam')?.addEventListener('click',hideCamUI);};
        async function stdEncryptProcess(){
            let items=[];
            if(stdCameraBlob) items=[{name:stdCameraName,mime:stdCameraBlob.type||'image/jpeg',data:await stdCameraBlob.arrayBuffer()}];
            else for(const f of stdFiles) items.push({name:f.name,mime:f.type||'application/octet-stream',data:await f.arrayBuffer()});
            if(items.length===0) throw new Error("无文件");
            const isBatch=items.length>1;
            if(isBatch){
                const rawBatch=await buildBatchPayload(items); const hash=await sha256(rawBatch); const comp=await compress(rawBatch); const final=concatBufs([new Uint8Array(hash).buffer,comp]); const key=await genKey(); const keyB64=await exportKeyB64(key); const encrypted=await aesEncrypt(key,final); genKeySpan.innerText=keyB64; encryptResultDiv.style.display='block'; if(stdDownloadUrl) URL.revokeObjectURL(stdDownloadUrl); stdDownloadUrl=URL.createObjectURL(new Blob([encrypted])); downloadBtn.onclick=()=>{const a=document.createElement('a');a.href=stdDownloadUrl;a.download=`batch_${Date.now()}.aes`;a.click();}; copyKeyBtn.onclick=()=>{navigator.clipboard.writeText(keyB64);alert("复制成功");};
            }else{
                const f=items[0]; const hash=await sha256(f.data); const comp=await compress(f.data); const payload=await buildSinglePayload(f.mime,hash,comp); const key=await genKey(); const keyB64=await exportKeyB64(key); const encrypted=await aesEncrypt(key,payload); genKeySpan.innerText=keyB64; encryptResultDiv.style.display='block'; if(stdDownloadUrl) URL.revokeObjectURL(stdDownloadUrl); stdDownloadUrl=URL.createObjectURL(new Blob([encrypted])); downloadBtn.onclick=()=>{const a=document.createElement('a');a.href=stdDownloadUrl;a.download=`enc_${f.name.replace(/\.[^/.]+$/,'')||'file'}.aes`;a.click();}; copyKeyBtn.onclick=()=>{navigator.clipboard.writeText(keyB64);alert("复制成功");};
            }
        }
        stdEncryptBtn.addEventListener('click',async()=>{stdEncryptBtn.disabled=true;stdEncryptBtn.innerText='⏳ 加密中...';try{await stdEncryptProcess();stdEncryptBtn.innerText='✨ 加密完成';}catch(e){alert("加密失败:"+e.message);stdEncryptBtn.innerText='❌ 重试';}finally{stdEncryptBtn.disabled=false;}});

        // ---------- 穿梭框库（全局共享，供解密加入） ----------
        let leftItems=[], rightItems=[], nextId=1;
        let transferCameraStream=null;
        const transferAddInput=document.getElementById('transferAddFiles'), transferCamBtn=document.getElementById('transferCameraBtn');
        const leftDiv=document.getElementById('leftList'), rightDiv=document.getElementById('rightList'), leftCount=document.getElementById('leftCount'), rightCount=document.getElementById('rightCount');
        const toRight=document.getElementById('toRightBtn'), toLeft=document.getElementById('toLeftBtn'), toAllRight=document.getElementById('toAllRightBtn');
        const transferEncrypt=document.getElementById('transferEncryptBtn');
        const transferCamContainer=document.getElementById('transferCameraContainer');
        function renderTransfer(){
            leftDiv.innerHTML='';rightDiv.innerHTML='';
            leftItems.forEach(it=>leftDiv.appendChild(createTransferItem(it,false)));
            rightItems.forEach(it=>rightDiv.appendChild(createTransferItem(it,true)));
            leftCount.innerText=leftItems.length; rightCount.innerText=rightItems.length;
        }
        function createTransferItem(item,isRight){
            const div=document.createElement('div');div.className='transfer-item';
            const isImage=item.mime.startsWith('image/');
            if(isImage){ const img=document.createElement('img');img.src=item.dataUrl;div.appendChild(img);}
            else{ const icon=document.createElement('div');icon.className='doc-icon';icon.innerText='📄';div.appendChild(icon);}
            const span=document.createElement('span');span.innerText=item.name;div.appendChild(span);
            const del=document.createElement('button');del.innerText='🗑️';del.style.background='none';del.onclick=(e)=>{e.stopPropagation();if(isRight)rightItems=rightItems.filter(i=>i.id!==item.id);else leftItems=leftItems.filter(i=>i.id!==item.id);renderTransfer();};
            div.appendChild(del);
            div.onclick=(e)=>{if(e.target===del)return;if(isRight)moveToLeft(item.id);else moveToRight(item.id);};
            return div;
        }
        function moveToRight(id){const idx=leftItems.findIndex(i=>i.id===id);if(idx!==-1){rightItems.push(leftItems[idx]);leftItems.splice(idx,1);renderTransfer();}}
        function moveToLeft(id){const idx=rightItems.findIndex(i=>i.id===id);if(idx!==-1){leftItems.push(rightItems[idx]);rightItems.splice(idx,1);renderTransfer();}}
        function moveAllRight(){rightItems.push(...leftItems);leftItems=[];renderTransfer();}
        async function addFileToLeft(file){
            const ab=await file.arrayBuffer(); const url=URL.createObjectURL(file);
            leftItems.push({id:nextId++, name:file.name, mime:file.type||'application/octet-stream', dataUrl:url, arrayBuffer:ab});
            renderTransfer();
        }
        transferAddInput.addEventListener('change',(e)=>{Array.from(e.target.files).forEach(f=>addFileToLeft(f));e.target.value='';});
        transferCamBtn.onclick=()=>{transferCamContainer.style.display='block';transferCamContainer.innerHTML=`<div><video id="transferCamVideo" autoplay playsinline class="camera-video"></video><div><button id="transferCapture" class="btn-sm">拍照添加</button><button id="transferCamClose" class="btn-sm">关闭</button></div></div>`;const vid=document.getElementById('transferCamVideo');navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{transferCameraStream=stream;vid.srcObject=stream;vid.play();}).catch(e=>alert("摄像头失败"));document.getElementById('transferCapture')?.addEventListener('click',()=>{const canvas=document.createElement('canvas');canvas.width=vid.videoWidth;canvas.height=vid.videoHeight;canvas.getContext('2d').drawImage(vid,0,0);canvas.toBlob(blob=>{if(blob){const file=new File([blob],`cam_${Date.now()}.jpg`,{type:'image/jpeg'});addFileToLeft(file);}},'image/jpeg',0.9);});document.getElementById('transferCamClose')?.addEventListener('click',()=>{if(transferCameraStream)transferCameraStream.getTracks().forEach(t=>t.stop());transferCamContainer.style.display='none';});};
        toRight.onclick=()=>{if(leftItems.length)moveToRight(leftItems[0].id);};
        toLeft.onclick=()=>{if(rightItems.length)moveToLeft(rightItems[0].id);};
        toAllRight.onclick=moveAllRight;
        transferEncrypt.addEventListener('click',async()=>{
            if(rightItems.length===0){alert("请将文件移至右侧待加密列表");return;}
            transferEncrypt.disabled=true;transferEncrypt.innerText='⏳ 加密中...';
            try{
                const items=rightItems.map(it=>({name:it.name,mime:it.mime,dataBuffer:it.arrayBuffer}));
                const rawBatch=await buildBatchPayload(items); const hash=await sha256(rawBatch); const comp=await compress(rawBatch); const final=concatBufs([new Uint8Array(hash).buffer,comp]); const key=await genKey(); const keyB64=await exportKeyB64(key); const encrypted=await aesEncrypt(key,final); genKeySpan.innerText=keyB64; encryptResultDiv.style.display='block'; if(stdDownloadUrl)URL.revokeObjectURL(stdDownloadUrl); stdDownloadUrl=URL.createObjectURL(new Blob([encrypted])); downloadBtn.onclick=()=>{const a=document.createElement('a');a.href=stdDownloadUrl;a.download=`transfer_batch_${Date.now()}.aes`;a.click();}; copyKeyBtn.onclick=()=>{navigator.clipboard.writeText(keyB64);alert("复制成功");}; transferEncrypt.innerText='🔒 加密完成';
            }catch(e){alert("加密失败:"+e.message);transferEncrypt.innerText='❌ 重试';}finally{transferEncrypt.disabled=false;}
        });

        // ---------- 模式切换 ----------
        const stdMode=document.getElementById('standardModeBtn'), tranMode=document.getElementById('transferModeBtn');
        const stdPanel=document.getElementById('standardModePanel'), tranPanel=document.getElementById('transferModePanel');
        stdMode.onclick=()=>{stdMode.classList.add('active');tranMode.classList.remove('active');stdPanel.style.display='block';tranPanel.style.display='none';};
        tranMode.onclick=()=>{tranMode.classList.add('active');stdMode.classList.remove('active');stdPanel.style.display='none';tranPanel.style.display='block';};

        // ---------- 解密区域（增强：每个解密文件可加入图片库）----------
        const decryptFile=document.getElementById('decryptFileInput'), decryptNameSpan=document.getElementById('decryptFileName');
        const decryptKey=document.getElementById('decryptKeyInput'), decryptBtn=document.getElementById('decryptBtn');
        const decryptStatusDivv=document.getElementById('decryptStatus'), verifyMsg=document.getElementById('verifyMessage'), decryptPreview=document.getElementById('decryptPreviewArea');
        function clearDecryptPreview(){decryptPreview.innerHTML='';decryptPreview.style.display='none';if(window._decUrls)window._decUrls.forEach(u=>URL.revokeObjectURL(u));window._decUrls=null;}
        function showDecryptBatch(files){
            clearDecryptPreview(); decryptPreview.style.display='block'; const gallery=document.createElement('div');gallery.style.display='flex';gallery.style.flexWrap='wrap';gallery.style.gap='12px'; const urls=[];
            for(let f of files){ const blob=new Blob([f.dataBuffer],{type:f.mime}); const url=URL.createObjectURL(blob); urls.push(url); const div=document.createElement('div');div.style.width='130px';div.style.background='var(--thumb-bg)';div.style.borderRadius='8px';div.style.padding='6px';div.style.textAlign='center'; const isImage=f.mime.startsWith('image/'); if(isImage){ const img=document.createElement('img');img.src=url;img.style.width='100px';img.style.height='100px';img.style.objectFit='cover';img.style.borderRadius='6px';img.style.cursor='pointer';img.onclick=()=>openModal(url);div.appendChild(img);}else{ const icon=document.createElement('div');icon.innerText='📄';icon.style.fontSize='40px';div.appendChild(icon);} const nameSpan=document.createElement('div');nameSpan.innerText=f.name;nameSpan.style.fontSize='0.7rem';div.appendChild(nameSpan); const btnGroup=document.createElement('div');btnGroup.style.display='flex';btnGroup.style.gap='4px';btnGroup.style.marginTop='6px'; const saveBtn=document.createElement('button');saveBtn.innerText='💾保存';saveBtn.className='btn-sm';saveBtn.onclick=(e)=>{e.stopPropagation();const a=document.createElement('a');a.href=url;a.download=f.name;a.click();}; const addLibBtn=document.createElement('button');addLibBtn.innerText='📚加入库';addLibBtn.className='btn-sm';addLibBtn.onclick=async(e)=>{e.stopPropagation(); const fileObj=new File([f.dataBuffer],f.name,{type:f.mime}); await addFileToLeft(fileObj); alert(`已添加 "${f.name}" 到图片库左侧`);}; btnGroup.appendChild(saveBtn);btnGroup.appendChild(addLibBtn);div.appendChild(btnGroup);gallery.appendChild(div);} decryptPreview.appendChild(gallery); window._decUrls=urls;
        }
        function showDecryptSingle(blob,mime,name){
            clearDecryptPreview(); decryptPreview.style.display='block'; const url=URL.createObjectURL(blob); window._decUrls=[url]; const container=document.createElement('div');container.style.textAlign='center'; if(mime.startsWith('image/')){ const img=document.createElement('img');img.src=url;img.style.maxWidth='100%';img.style.maxHeight='300px';img.style.cursor='pointer';img.onclick=()=>openModal(url);container.appendChild(img);} else if(mime.startsWith('video/')){ const vid=document.createElement('video');vid.src=url;vid.controls=true;container.appendChild(vid);} else{ const pre=document.createElement('pre');pre.style.maxHeight='200px';pre.style.overflow='auto';fetch(url).then(r=>r.text()).then(t=>pre.innerText=t);container.appendChild(pre);} const nameSpan=document.createElement('div');nameSpan.innerText=name||'file';nameSpan.style.margin='8px 0'; const btnGroup=document.createElement('div'); const saveBtn=document.createElement('button');saveBtn.innerText='💾保存文件';saveBtn.className='btn-sm';saveBtn.onclick=()=>{const a=document.createElement('a');a.href=url;a.download=name||'decrypted';a.click();}; const addLibBtn=document.createElement('button');addLibBtn.innerText='📚加入图片库';addLibBtn.className='btn-sm';addLibBtn.onclick=async()=>{ const fileObj=new File([blob],name||'decrypted_file',{type:mime}); await addFileToLeft(fileObj); alert(`已添加到图片库左侧`);}; btnGroup.appendChild(saveBtn);btnGroup.appendChild(addLibBtn);container.appendChild(btnGroup); decryptPreview.appendChild(container);
        }
        decryptBtn.addEventListener('click',async()=>{
            if(!decryptFile.files.length){alert("请上传加密文件");return;}
            const keyRaw=decryptKey.value.trim(); if(!keyRaw){alert("请输入密钥");return;}
            const encBuf=await decryptFile.files[0].arrayBuffer(); const statusSpan=decryptStatusDivv.querySelector('.status-badge');
            statusSpan.innerText='🔍 解密验证...';statusSpan.className='status-badge'; verifyMsg.innerHTML=''; clearDecryptPreview(); decryptBtn.disabled=true;
            try{
                const aesKey=await importKeyB64(keyRaw); const plain=await aesDecrypt(aesKey,encBuf); let decomp; try{decomp=await decompress(plain);}catch(e){decomp=plain;}
                if(decomp.byteLength>=36){ const possibleHash=new Uint8Array(decomp,0,32); const rest=decomp.slice(32); try{ const maybeRaw=await decompress(rest); if(maybeRaw.byteLength>=4 && new Uint8Array(maybeRaw,0,4)[0]===77){ const files=await parseBatchPayload(maybeRaw); const computed=await sha256(maybeRaw); const valid=computed.length===possibleHash.length && computed.every((v,i)=>v===possibleHash[i]); if(!valid)throw new Error("批量哈希失败"); statusSpan.innerText='✅ 批量解密成功';statusSpan.classList.add('success'); verifyMsg.innerHTML=`<span style="color:#2ecc71;">✓ 完整性通过，共${files.length}个文件</span><br><span class="small-note">每个文件下方有【加入库】按钮</span>`; showDecryptBatch(files); decryptBtn.disabled=false; return; } }catch(e){ } }
                const single=await parseSinglePayload(decomp); const original=await decompress(single.compressedData); const computedHash=await sha256(original); const valid=computedHash.length===single.expectedHash.length && computedHash.every((v,i)=>v===single.expectedHash[i]); if(!valid)throw new Error("哈希校验失败"); const blob=new Blob([original],{type:single.mimeType}); const fname=decryptFile.files[0].name.replace(/\.aes$/i,'')||'decrypted'; showDecryptSingle(blob,single.mimeType,fname); statusSpan.innerText='✅ 解密成功';statusSpan.classList.add('success'); verifyMsg.innerHTML=`<span style="color:#2ecc71;">✓ 哈希验证通过</span><div>大小:${(original.byteLength/1024/1024).toFixed(2)}MB</div><div class="small-note">点击【加入库】可将文件添加到穿梭框左侧</div>`;
            }catch(err){ statusSpan.innerText='❌ 失败';statusSpan.classList.add('error'); verifyMsg.innerHTML=`<span style="color:#e74c3c;">${err.message}</span>`; clearDecryptPreview(); } finally{ decryptBtn.disabled=false; }
        });
        decryptFile.addEventListener('change',(e)=>{if(e.target.files.length)decryptNameSpan.innerText=e.target.files[0].name;else decryptNameSpan.innerText="未选择文件";clearDecryptPreview();verifyMsg.innerHTML='';const badge=decryptStatusDivv.querySelector('.status-badge');if(badge){badge.className='status-badge';badge.innerText='等待解密';}});
        function openModal(src){const modal=document.getElementById('imageModal');const modalImg=document.getElementById('modalImg');modal.style.display='flex';modalImg.src=src;}
        document.querySelector('.close-modal').onclick=()=>document.getElementById('imageModal').style.display='none';
        document.getElementById('imageModal').onclick=(e)=>{if(e.target===document.getElementById('imageModal'))document.getElementById('imageModal').style.display='none';};
        updateStdThumbs(); renderTransfer();
    })();
</script>
